<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校友管理系统 - 首页</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- ===== 顶部导航栏 ===== -->
        <header class="top-nav">
            <div class="nav-left">
                <h1 class="nav-title">🎓 校友管理系统</h1>
            </div>
            <div class="nav-right">
                <span class="user-greeting" v-if="userInfo">
                    {{ userInfo.username }}
                    <span class="role-badge" :class="'role-' + userInfo.role" style="margin-left:6px;">
                        {{ roleMap[userInfo.role] || '未知' }}
                    </span>
                </span>
                <button class="nav-btn" @click="goToChangePassword">修改密码</button>
                <button class="nav-btn nav-btn-logout" @click="doLogout">退出登录</button>
            </div>
        </header>

        <!-- ===== 主内容区 ===== -->
        <main class="main-container">
            <!-- 加载状态 -->
            <div v-if="loading" class="loading-tip">正在加载数据...</div>

            <!-- 错误消息 -->
            <div v-if="errorMsg" class="error-msg">{{ errorMsg }}</div>

            <!-- =============================================== -->
            <!-- 学生视图（role=1）：查看自己的信息 -->
            <!-- =============================================== -->
            <template v-if="!isTeacherOrAdmin && !loading">
                <!-- 账号信息卡片 -->
                <div v-if="userInfo" class="info-card">
                    <h3 class="card-title">👤 账号信息</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">用户名</span>
                            <span class="info-value">{{ userInfo.username }}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">手机号</span>
                            <span class="info-value">{{ userInfo.phone }}</span>
                        </div>
                    </div>
                </div>

                <!-- 个人信息卡片 -->
                <div v-if="studentInfo" class="info-card">
                    <h3 class="card-title">📋 个人信息</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">姓名</span>
                            <span class="info-value">{{ studentInfo.name || '-' }}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">性别</span>
                            <span class="info-value">{{ genderMap[studentInfo.gender] || '-' }}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">学号</span>
                            <span class="info-value">{{ studentInfo.studentNo || '-' }}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">身份证号</span>
                            <span class="info-value">{{ studentInfo.idCard || '-' }}</span>
                        </div>
                    </div>
                </div>

                <!-- 学院信息卡片 -->
                <div v-if="studentInfo" class="info-card">
                    <h3 class="card-title">🏫 学院信息</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">学院</span>
                            <span class="info-value">{{ studentInfo.collegeName || '-' }}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">专业</span>
                            <span class="info-value">{{ studentInfo.majorName || '-' }}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">班级</span>
                            <span class="info-value">{{ studentInfo.className || '-' }}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">年级</span>
                            <span class="info-value">{{ studentInfo.grade || '-' }}</span>
                        </div>
                    </div>
                </div>

                <!-- 入学信息卡片 -->
                <div v-if="studentInfo" class="info-card">
                    <h3 class="card-title">📅 入学信息</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">入校时间</span>
                            <span class="info-value">{{ studentInfo.enrollDate || '-' }}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">毕业时间</span>
                            <span class="info-value">{{ studentInfo.graduateDate || '在读' }}</span>
                        </div>
                    </div>
                </div>

                <!-- 未找到学生信息时的提示 -->
                <div v-if="!studentInfo && !errorMsg" class="empty-tip">
                    <p>暂未查询到学生信息</p>
                    <p class="empty-sub">请联系管理员完善您的学生档案信息</p>
                </div>
            </template>

            <!-- =============================================== -->
            <!-- 教师/管理员视图（role>=2）：管理所有学生信息 -->
            <!-- =============================================== -->
            <template v-if="isTeacherOrAdmin && !loading">
                <!-- 返回列表按钮（查看详情时显示） -->
                <div v-if="viewingDetail" class="back-bar">
                    <button class="nav-btn" @click="backToList">← 返回学生列表</button>
                </div>

                <!-- 学生列表视图 -->
                <div v-if="!viewingDetail">
                    <!-- 搜索栏 -->
                    <div class="search-bar">
                        <input v-model="searchKeyword" type="text" placeholder="搜索姓名、学号、学院、专业、班级..." class="search-input">
                        <span class="search-count">共 {{ filteredStudentList.length }} 名学生</span>
                    </div>

                    <!-- 学生列表 -->
                    <div v-if="filteredStudentList.length > 0" class="student-list">
                        <div v-for="stu in filteredStudentList" :key="stu.studentId"
                             class="student-list-item" @click="viewStudentDetail(stu)">
                            <div class="list-item-avatar">
                                {{ stu.name ? stu.name.charAt(0) : '?' }}
                            </div>
                            <div class="list-item-info">
                                <div class="list-item-name">
                                    {{ stu.name || '未知' }}
                                    <span class="list-item-gender" v-if="stu.gender === 1">♂</span>
                                    <span class="list-item-gender" v-else-if="stu.gender === 2">♀</span>
                                </div>
                                <div class="list-item-detail">
                                    {{ stu.studentNo || '无学号' }} · {{ stu.collegeName || '-' }} · {{ stu.majorName || '-' }} · {{ stu.className || '-' }}
                                </div>
                            </div>
                            <div class="list-item-arrow">→</div>
                        </div>
                    </div>

                    <!-- 空列表提示 -->
                    <div v-else class="empty-tip">
                        <p>{{ searchKeyword ? '未找到匹配的学生' : '暂无学生数据' }}</p>
                    </div>
                </div>

                <!-- 学生详情视图（教师/管理员查看某个学生的详细信息） -->
                <div v-if="viewingDetail">
                    <!-- 账号信息卡片 -->
                    <div v-if="userInfo" class="info-card">
                        <h3 class="card-title">
                            👤 当前登录
                            <span class="role-badge" :class="'role-' + userInfo.role" style="margin-left:8px;">
                                {{ roleMap[userInfo.role] || '未知' }}
                            </span>
                        </h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">用户名</span>
                                <span class="info-value">{{ userInfo.username }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">手机号</span>
                                <span class="info-value">{{ userInfo.phone }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 学生个人信息卡片 -->
                    <div v-if="studentInfo" class="info-card">
                        <h3 class="card-title">📋 {{ studentInfo.name || '未知' }} - 个人信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">姓名</span>
                                <span class="info-value">{{ studentInfo.name || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">性别</span>
                                <span class="info-value">{{ genderMap[studentInfo.gender] || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">学号</span>
                                <span class="info-value">{{ studentInfo.studentNo || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">身份证号</span>
                                <span class="info-value">{{ studentInfo.idCard || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">用户ID</span>
                                <span class="info-value">{{ studentInfo.userId }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">记录ID</span>
                                <span class="info-value">{{ studentInfo.studentId }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 学院信息卡片 -->
                    <div v-if="studentInfo" class="info-card">
                        <h3 class="card-title">🏫 学院信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">学院</span>
                                <span class="info-value">{{ studentInfo.collegeName || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">专业</span>
                                <span class="info-value">{{ studentInfo.majorName || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">班级</span>
                                <span class="info-value">{{ studentInfo.className || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">年级</span>
                                <span class="info-value">{{ studentInfo.grade || '-' }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 入学信息卡片 -->
                    <div v-if="studentInfo" class="info-card">
                        <h3 class="card-title">📅 入学信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">入校时间</span>
                                <span class="info-value">{{ studentInfo.enrollDate || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">毕业时间</span>
                                <span class="info-value">{{ studentInfo.graduateDate || '在读' }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 编辑按钮（教师/管理员） -->
                    <div v-if="!editing" class="action-bar">
                        <button class="login-btn edit-btn" @click="startEdit">✏️ 编辑信息</button>
                    </div>

                    <!-- 编辑表单（教师/管理员） -->
                    <div v-if="editing" class="info-card edit-card">
                        <h3 class="card-title">✏️ 编辑学生信息</h3>

                        <div class="form-group">
                            <label>姓名</label>
                            <input v-model="editForm.name" type="text" placeholder="请输入姓名">
                        </div>

                        <div class="form-group">
                            <label>性别</label>
                            <select v-model="editForm.gender">
                                <option :value="null">请选择</option>
                                <option :value="1">男</option>
                                <option :value="2">女</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>学号</label>
                            <input v-model="editForm.studentNo" type="text" placeholder="请输入学号">
                        </div>

                        <div class="form-group">
                            <label>身份证号</label>
                            <input v-model="editForm.idCard" type="text" placeholder="请输入身份证号">
                        </div>

                        <div class="form-group">
                            <label>入校时间</label>
                            <input v-model="editForm.enrollDate" type="date">
                        </div>

                        <div class="form-group">
                            <label>毕业时间</label>
                            <input v-model="editForm.graduateDate" type="date">
                        </div>

                        <!-- 保存成功提示 -->
                        <div v-if="saveSuccess" class="success-info" style="margin-top:0;margin-bottom:16px;">
                            <h4>✅ 修改成功</h4>
                        </div>

                        <!-- 错误消息 -->
                        <div v-if="errorMsg" class="error-msg">{{ errorMsg }}</div>

                        <!-- 按钮组 -->
                        <div class="edit-buttons">
                            <button class="login-btn" :disabled="saveLoading" @click="saveEdit" style="flex:1;">
                                {{ saveLoading ? '保存中...' : '💾 保存修改' }}
                            </button>
                            <button class="nav-btn" @click="cancelEdit" style="flex:1;justify-content:center;">
                                取消
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="/js/home.js"></script>
</body>
</html>
