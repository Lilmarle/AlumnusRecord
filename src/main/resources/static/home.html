<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校友管理系统 - 首页</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- ===== 顶部导航栏 ===== -->
        <header class="top-nav">
            <div class="nav-left">
                <h1 class="nav-title">🎓 校友管理系统</h1>
            </div>
            <div class="nav-right">
                <span class="user-greeting" v-if="userInfo">
                    {{ userInfo.username }}
                    <span class="role-badge" :class="'role-' + userInfo.role" style="margin-left:6px;">
                        {{ roleMap[userInfo.role] || '未知' }}
                    </span>
                </span>
                <button class="nav-btn" @click="goToChangePassword">修改密码</button>
                <button class="nav-btn nav-btn-logout" @click="doLogout">退出登录</button>
            </div>
        </header>

        <!-- ===== 侧边栏 ===== -->
        <aside class="sidebar">
            <div class="sidebar-menu">
                <div class="sidebar-section-title">功能导航</div>
                <div v-for="tab in tabList" :key="tab.key"
                     class="sidebar-item"
                     :class="{ 'sidebar-item-active': activeTab === tab.key }"
                     @click="switchTab(tab.key)">
                    <span class="sidebar-icon">{{ tab.icon }}</span>
                    <span class="sidebar-label">{{ tab.label }}</span>
                </div>
            </div>
        </aside>

        <!-- ===== 主内容区 ===== -->
        <main class="main-container">

            <!-- 加载状态 -->
            <div v-if="loading" class="loading-tip">正在加载数据...</div>

            <!-- 错误消息 -->
            <div v-if="errorMsg" class="error-msg">{{ errorMsg }}</div>

            <!-- =============================================== -->
            <!-- TAB: 学生管理 -->
            <!-- =============================================== -->
            <template v-if="activeTab === 'student' && !loading">

                <!-- 学生视图（role=1）：查看自己的信息 -->
                <template v-if="!isTeacherOrAdmin">
                    <!-- 账号信息卡片 -->
                    <div v-if="userInfo" class="info-card">
                        <h3 class="card-title">👤 账号信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">用户名</span>
                                <span class="info-value">{{ userInfo.username }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">手机号</span>
                                <span class="info-value">{{ userInfo.phone }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 个人信息卡片 -->
                    <div v-if="studentInfo" class="info-card">
                        <h3 class="card-title">📋 个人信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">姓名</span>
                                <span class="info-value">{{ studentInfo.name || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">性别</span>
                                <span class="info-value">{{ genderMap[studentInfo.gender] || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">学号</span>
                                <span class="info-value">{{ studentInfo.studentNo || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">身份证号</span>
                                <span class="info-value">{{ studentInfo.idCard || '-' }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 学院信息卡片 -->
                    <div v-if="studentInfo" class="info-card">
                        <h3 class="card-title">🏫 学院信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">学院</span>
                                <span class="info-value">{{ studentInfo.collegeName || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">专业</span>
                                <span class="info-value">{{ studentInfo.majorName || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">班级</span>
                                <span class="info-value">{{ studentInfo.className || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">年级</span>
                                <span class="info-value">{{ studentInfo.grade || '-' }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 入学信息卡片 -->
                    <div v-if="studentInfo" class="info-card">
                        <h3 class="card-title">📅 入学信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">入校时间</span>
                                <span class="info-value">{{ studentInfo.enrollDate || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">毕业时间</span>
                                <span class="info-value">{{ studentInfo.graduateDate || '在读' }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 辅导员/导师信息卡片 -->
                    <div v-if="studentInfo" class="info-card">
                        <h3 class="card-title">👥 辅导员/导师信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">辅导员</span>
                                <span class="info-value">{{ studentInfo.counselorName || '未分配' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">学业导师</span>
                                <span class="info-value">{{ studentInfo.supervisorName || '未分配' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">用户状态</span>
                                <span class="info-value">
                                    <span :class="studentInfo.userStatus === 1 ? 'status-badge status-active' : 'status-badge status-inactive'">
                                        {{ studentInfo.statusName || '未知' }}
                                    </span>
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- 未找到学生信息时的提示 -->
                    <div v-if="!studentInfo && !errorMsg" class="empty-tip">
                        <p>暂未查询到学生信息</p>
                        <p class="empty-sub">请联系管理员完善您的学生档案信息</p>
                    </div>
                </template>

                <!-- 教师/管理员视图（role>=2）：管理所有学生信息 -->
                <template v-if="isTeacherOrAdmin">
                    <!-- 返回列表按钮（查看详情时显示） -->
                    <div v-if="viewingDetail" class="back-bar">
                        <button class="nav-btn" @click="backToList">← 返回学生列表</button>
                    </div>

                    <!-- 学生列表视图 -->
                    <div v-if="!viewingDetail">
                        <!-- 搜索栏 -->
                        <div class="search-bar">
                            <input v-model="searchKeyword" type="text" placeholder="搜索姓名、学号、学院、专业、班级..." class="search-input">
                            <span class="search-count">共 {{ filteredStudentList.length }} 名学生</span>
                        </div>

                        <!-- 学生列表 -->
                        <div v-if="filteredStudentList.length > 0" class="student-list">
                            <div v-for="stu in filteredStudentList" :key="stu.studentId"
                                 class="student-list-item" @click="viewStudentDetail(stu)">

                                <div class="list-item-info">
                                    <div class="list-item-name">
                                        {{ stu.name || '未知' }}
                                        <span class="list-item-gender" v-if="stu.gender === 1">♂</span>
                                        <span class="list-item-gender" v-else-if="stu.gender === 2">♀</span>
                                    </div>
                                    <div class="list-item-detail">
                                        {{ stu.studentNo || '无学号' }} · {{ stu.collegeName || '-' }} · {{ stu.majorName || '-' }} · {{ stu.className || '-' }}
                                    </div>
                                </div>
                                <div class="list-item-arrow" @click.stop>→</div>
                                <button class="list-item-settings" @click.stop="quickEditStudent(stu)" title="修改信息">⚙️</button>
                            </div>
                        </div>

                        <!-- 空列表提示 -->
                        <div v-else class="empty-tip">
                            <p>{{ searchKeyword ? '未找到匹配的学生' : '暂无学生数据' }}</p>
                        </div>
                    </div>

                    <!-- 学生详情视图（教师/管理员查看某个学生的详细信息） -->
                    <div v-if="viewingDetail">
                        <!-- 账号信息卡片 -->
                        <div v-if="userInfo" class="info-card">
                            <h3 class="card-title">
                                👤 当前登录
                                <span class="role-badge" :class="'role-' + userInfo.role" style="margin-left:8px;">
                                    {{ roleMap[userInfo.role] || '未知' }}
                                </span>
                            </h3>
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">用户名</span>
                                    <span class="info-value">{{ userInfo.username }}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">手机号</span>
                                    <span class="info-value">{{ userInfo.phone }}</span>
                                </div>
                            </div>
                        </div>

                        <!-- 学生个人信息卡片 -->
                        <div v-if="studentInfo" class="info-card">
                            <h3 class="card-title">📋 {{ studentInfo.name || '未知' }} - 个人信息</h3>
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">姓名</span>
                                    <span class="info-value">{{ studentInfo.name || '-' }}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">性别</span>
                                    <span class="info-value">{{ genderMap[studentInfo.gender] || '-' }}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">学号</span>
                                    <span class="info-value">{{ studentInfo.studentNo || '-' }}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">身份证号</span>
                                    <span class="info-value">{{ studentInfo.idCard || '-' }}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">用户ID</span>
                                    <span class="info-value">{{ studentInfo.userId }}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">记录ID</span>
                                    <span class="info-value">{{ studentInfo.studentId }}</span>
                                </div>
                            </div>
                        </div>

                        <!-- 学院信息卡片 -->
                        <div v-if="studentInfo" class="info-card">
                            <h3 class="card-title">🏫 学院信息</h3>
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">学院</span>
                                    <span class="info-value">{{ studentInfo.collegeName || '-' }}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">专业</span>
                                    <span class="info-value">{{ studentInfo.majorName || '-' }}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">班级</span>
                                    <span class="info-value">{{ studentInfo.className || '-' }}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">年级</span>
                                    <span class="info-value">{{ studentInfo.grade || '-' }}</span>
                                </div>
                            </div>
                        </div>

                        <!-- 入学信息卡片 -->
                        <div v-if="studentInfo" class="info-card">
                            <h3 class="card-title">📅 入学信息</h3>
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">入校时间</span>
                                    <span class="info-value">{{ studentInfo.enrollDate || '-' }}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">毕业时间</span>
                                    <span class="info-value">{{ studentInfo.graduateDate || '在读' }}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 辅导员/导师信息卡片（教师/管理员查看） -->
                    <div v-if="studentInfo" class="info-card">
                        <h3 class="card-title">👥 辅导员/导师信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">辅导员</span>
                                <span class="info-value">{{ studentInfo.counselorName || '未分配' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">学业导师</span>
                                <span class="info-value">{{ studentInfo.supervisorName || '未分配' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">用户状态</span>
                                <span class="info-value">
                                    <span :class="studentInfo.userStatus === 1 ? 'status-badge status-active' : 'status-badge status-inactive'">
                                        {{ studentInfo.statusName || '未知' }}
                                    </span>
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- 编辑按钮（教师/管理员） -->
                        <div v-if="!editing" class="action-bar">
                            <button class="login-btn edit-btn" @click="startEdit">✏️ 编辑信息</button>
                        </div>
                    </div>
                </template>
            </template>

            <!-- =============================================== -->
            <!-- TAB: 教师管理 -->
            <!-- =============================================== -->
            <template v-if="activeTab === 'teacher' && !loading">

                <!-- 教师视图（role=2）：查看自己的信息 -->
                <template v-if="userInfo && userInfo.role === 2">
                    <!-- 账号信息卡片 -->
                    <div v-if="teacherInfo" class="info-card">
                        <h3 class="card-title">👤 账号信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">用户名</span>
                                <span class="info-value">{{ teacherInfo.username || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">手机号</span>
                                <span class="info-value">{{ teacherInfo.phone || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">状态</span>
                                <span class="info-value">{{ teacherInfo.statusName || '-' }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 个人信息卡片 -->
                    <div v-if="teacherInfo" class="info-card">
                        <h3 class="card-title">📋 个人信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">姓名</span>
                                <span class="info-value">{{ teacherInfo.realName || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">性别</span>
                                <span class="info-value">{{ teacherInfo.genderName || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">身份证号</span>
                                <span class="info-value">{{ teacherInfo.idCard || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">工号</span>
                                <span class="info-value">{{ teacherInfo.employeeNo || '-' }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 教师信息卡片 -->
                    <div v-if="teacherInfo" class="info-card">
                        <h3 class="card-title">🏫 教师信息</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">学院</span>
                                <span class="info-value">{{ teacherInfo.collegeName || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">职称</span>
                                <span class="info-value">{{ teacherInfo.title || '-' }}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">入职时间</span>
                                <span class="info-value">{{ teacherInfo.hireDate || '-' }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 编辑按钮 -->
                    <div v-if="teacherInfo && !teacherEditing" class="action-bar">
                        <button class="login-btn edit-btn" @click="startTeacherEdit">✏️ 编辑信息</button>
                    </div>

                    <!-- 编辑表单 -->
                    <div v-if="teacherEditing" class="info-card">
                        <h3 class="card-title">✏️ 编辑个人信息</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>姓名</label>
                                <input v-model="teacherEditForm.name" type="text" placeholder="请输入姓名">
                            </div>
                            <div class="form-group">
                                <label>性别</label>
                                <select v-model="teacherEditForm.gender">
                                    <option :value="null">请选择</option>
                                    <option :value="1">男</option>
                                    <option :value="2">女</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>身份证号</label>
                                <input v-model="teacherEditForm.idCard" type="text" placeholder="请输入身份证号">
                            </div>
                            <div class="form-group">
                                <label>工号</label>
                                <input v-model="teacherEditForm.employeeNo" type="text" placeholder="请输入工号">
                            </div>
                            <div class="form-group">
                                <label>学院</label>
                                <select v-model="teacherEditForm.collegeId">
                                    <option :value="null">请选择学院</option>
                                    <option v-for="c in colleges" :key="c.id" :value="c.id">
                                        {{ c.collegeName }}
                                    </option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>职称</label>
                                <input v-model="teacherEditForm.title" type="text" placeholder="请输入职称">
                            </div>
                            <div class="form-group">
                                <label>入职时间</label>
                                <input v-model="teacherEditForm.hireDate" type="date">
                            </div>
                        </div>

                        <div v-if="teacherSaveSuccess" class="success-info" style="margin-top:16px;">
                            <h4>✅ 修改成功</h4>
                        </div>
                        <div v-if="errorMsg && !teacherSaveSuccess" class="error-msg" style="margin-bottom:12px;">{{ errorMsg }}</div>

                        <div class="action-bar" style="margin-top:16px;">
                            <button class="nav-btn" @click="cancelTeacherEdit">取消</button>
                            <button class="login-btn" :disabled="teacherSaveLoading" @click="saveTeacherEdit" style="width:auto;padding:10px 24px;margin-left:8px;">
                                {{ teacherSaveLoading ? '保存中...' : '💾 保存修改' }}
                            </button>
                        </div>
                    </div>

                    <!-- 未找到教师信息时的提示 -->
                    <div v-if="!teacherInfo && !errorMsg" class="empty-tip">
                        <p>暂未查询到教师信息</p>
                        <p class="empty-sub">请联系管理员完善您的教师档案信息</p>
                    </div>

                    <!-- 所有教师列表（教师也可查看） -->
                    <div v-if="filteredTeacherList.length > 0" class="info-card" style="margin-top:20px;">
                        <h3 class="card-title">👥 全体教师列表</h3>
                        <!-- 搜索栏 -->
                        <div class="search-bar" style="margin-bottom:16px;">
                            <input v-model="searchTeacherKeyword" type="text" placeholder="搜索姓名、工号、学院、职称..." class="search-input">
                            <span class="search-count">共 {{ filteredTeacherList.length }} 名教师</span>
                        </div>

                        <div class="student-list">
                            <div v-for="t in filteredTeacherList" :key="t.teacherId"
                                 class="student-list-item" @click="viewTeacherDetail(t)">
                                <div class="list-item-info">
                                    <div class="list-item-name">
                                        {{ t.realName || '未知' }}
                                        <span class="list-item-gender" v-if="t.gender === 1">♂</span>
                                        <span class="list-item-gender" v-else-if="t.gender === 2">♀</span>
                                    </div>
                                    <div class="list-item-detail">
                                        {{ t.employeeNo || '无工号' }} · {{ t.collegeName || '-' }} · {{ t.title || '-' }}
                                        · <span :style="{ color: t.userStatus === 1 ? '#27ae60' : '#e74c3c' }">{{ t.statusName || '-' }}</span>
                                    </div>
                                </div>
                                <div class="list-item-arrow" @click.stop>→</div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- 管理员视图（role=3）：管理所有教师信息 -->
                <template v-if="userInfo && userInfo.role === 3">
                    <!-- 返回列表按钮（查看详情时显示） -->
                    <div v-if="viewingTeacherDetail" class="back-bar">
                        <button class="nav-btn" @click="backToTeacherList">← 返回教师列表</button>
                    </div>

                    <!-- 教师列表视图 -->
                    <div v-if="!viewingTeacherDetail">
                        <!-- 搜索栏 -->
                        <div class="search-bar">
                            <input v-model="searchTeacherKeyword" type="text" placeholder="搜索姓名、工号、学院、职称..." class="search-input">
                            <span class="search-count">共 {{ filteredTeacherList.length }} 名教师</span>
                        </div>

                        <!-- 教师列表 -->
                        <div v-if="filteredTeacherList.length > 0" class="student-list">
                            <div v-for="t in filteredTeacherList" :key="t.teacherId"
                                 class="student-list-item" @click="viewTeacherDetail(t)">

                                <div class="list-item-info">
                                    <div class="list-item-name">
                                        {{ t.realName || '未知' }}
                                        <span class="list-item-gender" v-if="t.gender === 1">♂</span>
                                        <span class="list-item-gender" v-else-if="t.gender === 2">♀</span>
                                    </div>
                                    <div class="list-item-detail">
                                        {{ t.employeeNo || '无工号' }} · {{ t.collegeName || '-' }} · {{ t.title || '-' }}
                                        · <span :style="{ color: t.userStatus === 1 ? '#27ae60' : '#e74c3c' }">{{ t.statusName || '-' }}</span>
                                    </div>
                                </div>
                                <div class="list-item-arrow" @click.stop>→</div>
                                <button class="list-item-settings" @click.stop="openTeacherEditModal(t)" title="修改信息">⚙️</button>
                            </div>
                        </div>

                        <!-- 空列表提示 -->
                        <div v-else class="empty-tip">
                            <p>{{ searchTeacherKeyword ? '未找到匹配的教师' : '暂无教师数据' }}</p>
                        </div>
                    </div>

                    <!-- 教师详情视图（管理员查看某个教师的详细信息） -->
                    <div v-if="viewingTeacherDetail">
                        <!-- 账号信息卡片（含教师账号信息） -->
                        <div v-if="teacherInfo" class="info-card">
                            <h3 class="card-title">

                </div>

                <div class="modal-body">
                    <div class="form-group">
                        <label>姓名</label>
                        <input v-model="teacherEditForm.name" type="text" placeholder="请输入姓名">
                    </div>

                    <div class="form-group">
                        <label>性别</label>
                        <select v-model="teacherEditForm.gender">
                            <option :value="null">请选择</option>
                            <option :value="1">男</option>
                            <option :value="2">女</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>身份证号</label>
                        <input v-model="teacherEditForm.idCard" type="text" placeholder="请输入身份证号">
                    </div>

                    <div class="form-group">
                        <label>工号</label>
                        <input v-model="teacherEditForm.employeeNo" type="text" placeholder="请输入工号">
                    </div>

                    <div class="form-group">
                        <label>学院</label>
                        <select v-model="teacherEditForm.collegeId">
                            <option :value="null">请选择学院</option>
                            <option v-for="c in colleges" :key="c.id" :value="c.id">
                                {{ c.collegeName }}
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>职称</label>
                        <input v-model="teacherEditForm.title" type="text" placeholder="请输入职称">
                    </div>

                    <div class="form-group">
                        <label>入职时间</label>
                        <input v-model="teacherEditForm.hireDate" type="date">
                    </div>

                    <!-- 保存成功提示 -->
                    <div v-if="teacherSaveSuccess" class="success-info" style="margin-top:0;margin-bottom:16px;">
                        <h4>✅ 修改成功</h4>
                    </div>

                    <!-- 错误消息 -->
                    <div v-if="errorMsg && !teacherSaveSuccess" class="error-msg" style="margin-bottom:12px;">{{ errorMsg }}</div>
                </div>

                <div class="modal-footer">
                    <button class="nav-btn" @click="closeTeacherModal">取消</button>
                    <button class="login-btn" :disabled="teacherSaveLoading" @click="saveTeacherEdit" style="width:auto;padding:10px 24px;">
                        {{ teacherSaveLoading ? '保存中...' : '💾 保存修改' }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="/js/home.js"></script>
</body>
</html>
