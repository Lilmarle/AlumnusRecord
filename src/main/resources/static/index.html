<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校友管理系统 - 登录</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <div class="login-container">
            <h2>校友管理系统登录</h2>

            <!-- ===== 登录表单 ===== -->
            <div class="form-group">
                <label>账号 / 手机号</label>
                <input v-model="loginForm.account" type="text" placeholder="请输入用户名或手机号" @keyup.enter="doLogin">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input v-model="loginForm.password" type="password" placeholder="请输入密码" @keyup.enter="doLogin">
            </div>
            <button class="login-btn" :disabled="loading" @click="doLogin">
                {{ loading ? '登录中...' : '登 录' }}
            </button>

            <!-- 导航链接 -->
            <div class="switch-link">
                <a href="/register.html">注册账号</a>
                &nbsp;|&nbsp;
                <a href="/change-password.html">修改密码</a>
            </div>

            <!-- 错误消息 -->
            <div v-if="errorMsg" class="error-msg">{{ errorMsg }}</div>

            <!-- 登录成功信息 -->
            <div v-if="userInfo" class="success-info">
                <h4>✅ 登录成功</h4>
                <p><strong>用户ID：</strong>{{ userInfo.userId }}</p>
                <p><strong>用户名：</strong>{{ userInfo.username }}</p>
                <p><strong>手机号：</strong>{{ userInfo.phone }}</p>
                <p><strong>角色：</strong>{{ {1:'学生', 2:'老师', 3:'管理员'}[userInfo.role] }}</p>
                <p><strong>Token：</strong>{{ userInfo.token }}</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
