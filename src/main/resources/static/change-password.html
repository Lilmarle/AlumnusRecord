<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校友管理系统 - 修改密码</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <div class="login-container">
            <h2>修改密码</h2>

            <!-- ===== 修改密码表单 ===== -->
            <div class="form-group">
                <label>用户ID</label>
                <input v-model="changeForm.userId" type="number" placeholder="请输入用户ID" @keyup.enter="doChangePassword">
            </div>
            <div class="form-group">
                <label>旧密码</label>
                <input v-model="changeForm.oldPassword" type="password" placeholder="请输入旧密码" @keyup.enter="doChangePassword">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input v-model="changeForm.newPassword" type="password" placeholder="请输入新密码" @keyup.enter="doChangePassword">
            </div>
            <button class="login-btn" :disabled="loading" @click="doChangePassword">
                {{ loading ? '提交中...' : '修改密码' }}
            </button>

            <!-- 错误消息 -->
            <div v-if="errorMsg" class="error-msg">{{ errorMsg }}</div>

            <!-- 修改成功提示 -->
            <div v-if="changeSuccess" class="success-info">
                <h4>✅ 密码修改成功</h4>
                <p style="margin-top:10px;text-align:center;">
                    <a @click="goToLogin" style="color:#1a73e8;cursor:pointer;">返回登录 →</a>
                </p>
            </div>

            <!-- 返回链接 -->
            <div class="switch-link" v-if="!changeSuccess">
                <a @click="goToLogin">返回登录</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="/js/change-password.js"></script>
</body>
</html>
